name: Run Unit Tests

on:
  pull_request:
    branches:
      - main 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  

      - name: Install dependencies
        run: |
          pip install .

      - name: Run unit tests
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          python -m unittest discover
