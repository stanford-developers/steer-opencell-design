name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/stanford-developers/steer-opencell-design/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'nsiemons,dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before we can merge this PR, you need
            to sign our [Contributor License Agreement](https://github.com/stanford-developers/steer-opencell-design/blob/main/CLA.md).
            This is required because OpenCell Design is dual-licensed (AGPL-3.0 + commercial),
            and we need the right to distribute contributions under both licenses.


            To sign, please reply to this comment with exactly:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
